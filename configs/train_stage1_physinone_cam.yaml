experiment_name: exp_stage1_physinone_cam
run_group: stage1_physinone_cam
seed: 42

# Leave empty to inherit from path_config_cluster.env.
base_model_dir: ""
dataset_dir: ""
physinone_raw_dir: ""
lingbot_code_dir: ""
output_root: .
wandb_dir: runs/wandb

learning_rate: 1.0e-5
weight_decay: 0.01
num_epochs: 5
gradient_accumulation_steps: 4
max_grad_norm: 1.0

num_frames: 81
height: 480
width: 480
dataset_repeat: 1
num_workers: 4
save_every_n_epochs: 1
max_train_micro_steps: 0

student_tuning_mode: lora
student_lora_rank: 16
student_lora_alpha: 16
student_lora_dropout: 0.0
student_lora_block_start: 0
student_lora_chunk_size: 0
student_lora_merge_mode: inplace
student_memory_efficient_modulation: true
student_memory_efficient_checkpoint_mode: full
student_ffn_chunk_size: 4096
student_norm_chunk_size: 0
gradient_checkpointing: true
student_checkpoint_use_reentrant:
student_ddp_find_unused_parameters: true
distributed_timeout_hours: 8

videophy2_eval:
  enabled: true
  every_n_epochs: 1
  # IMPORTANT:
  # Do not point these at the old custom CSGO AutoEval path.
  # Stage-1 is expected to run the official VideoPhy-2 protocol here.
  # Fill these with the official generation + scoring commands for the
  # released VideoPhy-2 evaluation datasets/protocol.
  # Use ${checkpoint_dir}, ${bundle_dir}, ${output_dir}, ${experiment_name}, ${epoch}, ${branch}.
  generation_command: ""
  score_command: ""
  # Point this at the official summary.json produced by your score command.
  summary_json: ""
  working_dir: .
  fail_fast: false
  env: {}
